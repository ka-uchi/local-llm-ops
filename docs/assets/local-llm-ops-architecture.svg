<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">local-llm-ops Architecture Diagram</title>
  <desc id="desc">Architecture diagram for local-llm-ops. Clients connect to a replaceable gateway control layer, which uses Valkey and a proxy to route requests to local llama.cpp servers on the inference host.</desc>
  <defs>
    <style>
      .page{fill:#f8fafc}.header{fill:#eaf3ff;stroke:#3b82f6;stroke-width:1.6;rx:6}.outer{fill:#fff;stroke:#475569;stroke-width:1.8;rx:3}.host{fill:none;stroke:#94a3b8;stroke-width:1.5}.tile{rx:4;stroke:#fff;stroke-width:3}.title{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#0f172a}.host-title{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:700;fill:#0f172a}.sub{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#475569}.label{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#334155;text-anchor:middle}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#475569;text-anchor:middle}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:11px;fill:#475569}.arrow{fill:none;stroke:#94a3b8;stroke-width:2;marker-end:url(#arrow)}.arrow-strong{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#arrowStrong)}.arrow-dashed{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:8 6;marker-end:url(#arrow)}.publish{fill:none;stroke:#7c3aed;stroke-width:2.2;marker-end:url(#arrowPurple)}.note{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.2;rx:6}.client-icon{fill:#fff;stroke:#334155;stroke-width:4}.client-screen{fill:#e2e8f0;stroke:#334155;stroke-width:2}.legend{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#334155}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#94a3b8"/></marker>
    <marker id="arrowStrong" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#64748b"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#7c3aed"/></marker>
    <g id="gear" stroke="#fff" stroke-width="3" fill="none"><circle cx="40" cy="40" r="17"/><circle cx="40" cy="40" r="5" fill="#fff"/><path d="M40 14v10M40 56v10M14 40h10M56 40h10M22 22l7 7M51 51l7 7M58 22l-7 7M29 51l-7 7"/></g>
    <g id="db" stroke="#fff" stroke-width="3" fill="none"><ellipse cx="40" cy="22" rx="23" ry="9"/><path d="M17 22v36c0 5 10 9 23 9s23-4 23-9V22"/><path d="M17 40c0 5 10 9 23 9s23-4 23-9M17 58c0 5 10 9 23 9s23-4 23-9"/></g>
    <g id="proxy" stroke="#fff" stroke-width="3" fill="none"><circle cx="20" cy="40" r="9"/><circle cx="60" cy="20" r="9"/><circle cx="60" cy="60" r="9"/><path d="M29 36L51 24M29 44L51 56"/></g>
    <g id="server" stroke="#fff" stroke-width="3" fill="none"><rect x="17" y="16" width="46" height="18" rx="3"/><rect x="17" y="46" width="46" height="18" rx="3"/><circle cx="27" cy="25" r="2" fill="#fff"/><circle cx="27" cy="55" r="2" fill="#fff"/><path d="M35 25h20M35 55h20"/></g>
    <g id="folder" stroke="#fff" stroke-width="3" fill="none"><path d="M14 25h20l6 8h26v31H14z"/><path d="M14 33h52"/></g>
    <g id="doc" stroke="#fff" stroke-width="3" fill="none"><path d="M24 14h24l12 12v40H24z"/><path d="M48 14v14h12"/><path d="M32 40h20M32 50h20M32 60h14"/></g>
    <g id="gpu" stroke="#fff" stroke-width="3" fill="none"><rect x="15" y="22" width="50" height="36" rx="4"/><rect x="27" y="31" width="24" height="18" rx="3"/><path d="M65 33h8M65 47h8M10 31h5M10 40h5M10 49h5M31 14v8M40 14v8M49 14v8M31 58v8M40 58v8M49 58v8"/></g>
  </defs>
  <rect class="page" width="1600" height="1000"/>
  <rect class="header" x="80" y="20" width="1440" height="80"/>
  <text x="800" y="50" text-anchor="middle" class="title">&lt;&lt;LOCAL LLM OPS&gt;&gt;</text>
  <text x="800" y="72" text-anchor="middle" class="sub">Architecture Diagram / replaceable Control Layer / Version 1.0</text>
  <text x="800" y="90" text-anchor="middle" class="tiny">Valkey is placed on the gateway side as a shared status store.</text>
  <rect class="outer" x="255" y="150" width="1240" height="735"/>
  <text x="278" y="178" class="host-title">Local LLM Platform</text>
  <g transform="translate(70,330)"><rect class="client-icon" width="80" height="58" rx="2"/><rect class="client-screen" x="10" y="10" width="60" height="34"/><path d="M25 68h30M38 58v10" stroke="#334155" stroke-width="4" fill="none"/><text x="40" y="100" class="label">Client</text></g>
  <g transform="translate(75,690)"><rect class="client-icon" x="8" width="52" height="86" rx="8"/><rect class="client-screen" x="16" y="15" width="36" height="55"/><circle cx="34" cy="77" r="2" fill="#334155"/><text x="34" y="118" class="label">Mobile</text><text x="34" y="136" class="small">Client</text></g>
  <rect class="host" x="320" y="215" width="450" height="590"/><text x="338" y="242" class="host-title">Gateway host</text><text x="338" y="264" class="sub">control / routing / shared state</text>
  <rect class="host" x="850" y="215" width="585" height="590"/><text x="868" y="242" class="host-title">Inference host</text><text x="868" y="264" class="sub">GPU execution / llama.cpp / local operation</text>
  <g transform="translate(415,315)"><rect class="tile" width="80" height="80" fill="#6366f1"/><use href="#gear"/><text x="40" y="107" class="label">Control / Agent</text><text x="40" y="125" class="small">Backend</text><text x="40" y="143" class="small">replaceable</text></g>
  <g transform="translate(595,315)"><rect class="tile" width="80" height="80" fill="#7c3aed"/><use href="#db"/><text x="40" y="107" class="label">Valkey</text><text x="40" y="125" class="small">status store</text></g>
  <g transform="translate(505,560)"><rect class="tile" width="80" height="80" fill="#0ea5e9"/><use href="#proxy"/><text x="40" y="107" class="label">Proxy / API</text><text x="40" y="125" class="small">Gateway</text></g>
  <rect class="note" x="365" y="710" width="350" height="58"/><text x="540" y="734" text-anchor="middle" class="sub">Control layer implementation is not fixed</text><text x="540" y="754" text-anchor="middle" class="tiny">OpenClaw / custom backend / agent framework / simple API</text>
  <g transform="translate(930,305)"><rect class="tile" width="80" height="80" fill="#2563eb"/><use href="#folder"/><text x="40" y="107" class="label">local-llm-ops</text><text x="40" y="125" class="small">config/scripts</text></g>
  <g transform="translate(1120,305)"><rect class="tile" width="80" height="80" fill="#f97316"/><use href="#server"/><text x="40" y="107" class="label">llama.cpp</text><text x="40" y="125" class="small">server bin</text></g>
  <g transform="translate(1295,305)"><rect class="tile" width="80" height="80" fill="#64748b"/><use href="#doc"/><text x="40" y="107" class="label">docs</text><text x="40" y="125" class="small">operations</text></g>
  <g transform="translate(930,525)"><rect class="tile" width="80" height="80" fill="#10b981"/><use href="#gpu"/><text x="40" y="107" class="label">Qwen</text><text x="40" y="125" class="small">RTX 4090</text><text x="40" y="143" class="small">port 8080</text></g>
  <g transform="translate(1120,525)"><rect class="tile" width="80" height="80" fill="#10b981"/><use href="#gpu"/><text x="40" y="107" class="label">Gemma</text><text x="40" y="125" class="small">RTX 3090</text><text x="40" y="143" class="small">port 8081</text></g>
  <g transform="translate(1295,525)"><rect class="tile" width="80" height="80" fill="#f59e0b"/><use href="#gpu"/><text x="40" y="107" class="label">70B class</text><text x="40" y="125" class="small">future</text><text x="40" y="143" class="small">port 8090</text></g>
  <g transform="translate(1000,735)"><rect class="tile" width="80" height="80" fill="#475569"/><use href="#db"/><text x="40" y="107" class="label">models/</text><text x="40" y="125" class="small">GGUF files</text></g>
  <g transform="translate(1220,735)"><rect class="tile" width="80" height="80" fill="#475569"/><use href="#doc"/><text x="40" y="107" class="label">logs/</text><text x="40" y="125" class="small">logs / PID</text></g>
  <path class="arrow-strong" d="M150 360H415"/><path class="arrow-strong" d="M135 725C190 725 220 600 505 600"/>
  <path class="arrow" d="M495 355H595"/><text x="545" y="344" text-anchor="middle" class="tiny">read state</text><path class="arrow" d="M455 395C455 470 545 500 545 560"/><text x="490" y="495" class="tiny">route</text>
  <path class="arrow-strong" d="M585 600C720 600 780 565 930 565"/><path class="arrow-strong" d="M585 600C745 600 935 565 1120 565"/><path class="arrow-dashed" d="M585 600C820 600 1040 565 1295 565"/>
  <path class="arrow" d="M1010 345H1120"/><path class="arrow" d="M970 385V525"/><path class="arrow" d="M1010 365C1060 445 1130 485 1160 525"/><path class="arrow-dashed" d="M1010 365C1115 435 1260 455 1335 525"/>
  <path class="arrow" d="M1040 735C1015 675 990 635 970 605"/><path class="arrow" d="M1040 735C1080 680 1125 635 1160 605"/><path class="arrow-dashed" d="M1040 735C1130 675 1245 630 1335 605"/><path class="arrow" d="M1260 735C1240 670 1205 630 1160 605"/>
  <path class="publish" d="M930 345C815 345 770 405 675 405"/><text x="795" y="386" text-anchor="middle" class="tiny" fill="#7c3aed">status publish</text><path class="publish" d="M970 525C820 520 755 470 675 430"/>
  <rect class="note" x="650" y="485" width="185" height="52"/><text x="742" y="507" text-anchor="middle" class="tiny">Chat Completions</text><text x="742" y="525" text-anchor="middle" class="tiny">request forwarding</text>
  <rect class="note" x="80" y="910" width="1440" height="55"/><text x="105" y="934" class="legend">Legend:</text><line x1="165" y1="930" x2="230" y2="930" class="arrow-strong"/><text x="245" y="934" class="legend">request / routing</text><line x1="390" y1="930" x2="455" y2="930" class="publish"/><text x="470" y="934" class="legend">status publish / state access</text><line x1="675" y1="930" x2="740" y2="930" class="arrow-dashed"/><text x="755" y="934" class="legend">future or optional route</text><text x="1020" y="934" class="legend">OpenClaw is one possible implementation, not the fixed architecture.</text>
</svg>
